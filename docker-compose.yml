services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak_pw
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - ztnet

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    command: start --import-realm --health-enabled=true
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak_pw
      KC_HOSTNAME: keycloak
      KC_HTTPS_CERTIFICATE_FILE: /etc/x509/keycloak.crt
      KC_HTTPS_CERTIFICATE_KEY_FILE: /etc/x509/keycloak.key
      KC_HTTP_ENABLED: "false"
      KC_HEALTH_ENABLED: "true"
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8443:8443"
    volumes:
      - ./certs:/etc/x509:ro
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    depends_on:
      postgres:
        condition: service_healthy
    # The Keycloak image has bash but no curl/wget. Use bash's built-in
    # /dev/tcp to probe the management port's /health/ready endpoint.
    healthcheck:
      test:
        - "CMD-SHELL"
        - |
          exec 3<>/dev/tcp/localhost/9000 || exit 1
          printf 'GET /health/ready HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n' >&3
          grep -q '"status": "UP"' <&3
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s
    networks:
      - ztnet

  api:
    build: ./api
    environment:
      OIDC_ISSUER: https://keycloak:8443/realms/zerotrust
      OIDC_AUDIENCE: zerotrust-api
      TLS_CERT: /certs/api.crt
      TLS_KEY: /certs/api.key
      CA_CERT: /certs/ca.crt
    ports:
      - "8444:8444"
    volumes:
      - ./certs:/certs:ro
    depends_on:
      keycloak:
        condition: service_healthy
    networks:
      - ztnet

  client:
    build: ./client
    environment:
      KEYCLOAK_URL: https://keycloak:8443
      API_URL: https://api:8444
      CLIENT_ID: python-client
      CLIENT_SECRET: change-me-in-realm-export
      CA_CERT: /certs/ca.crt
    volumes:
      - ./certs:/certs:ro
    depends_on:
      - api
    networks:
      - ztnet

networks:
  ztnet:
    driver: bridge

volumes:
  pg_data:
